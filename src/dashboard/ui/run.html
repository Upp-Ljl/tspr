<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tspr — Run #{{RUN_ID}}</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<header class="topbar">
  <a class="topbar__brand" href="/">tspr<span>/dashboard</span></a>
  <nav class="topbar__nav">
    <a href="/">Overview</a>
    <a href="/compare">Compare</a>
    <a href="/cost">Cost</a>
  </nav>
</header>

<main class="page" id="run-page">
  <a class="back-link" href="/">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    All projects
  </a>

  <!-- Hydrated by JS from inline data -->
  <div id="run-root"
    data-run-id="{{RUN_ID}}"
    data-status="{{RUN_STATUS}}"
    data-run="{{RUN_JSON}}"
    data-results="{{TEST_RESULTS_JSON}}">
  </div>

  <!-- Transparency panel — populated by app.js from test_results.json _timeline -->
  <div id="transparency-panel" style="margin-top:2rem"></div>
</main>

<!-- Apply-fix feedback toast -->
<div id="fix-toast" class="fix-toast" style="display:none"></div>

<!-- Side panel for test detail + code viewer -->
<div class="side-panel__overlay" id="panel-overlay"></div>
<aside class="side-panel" id="side-panel">
  <div class="side-panel__header">
    <div class="side-panel__title" id="panel-title">Test detail</div>
    <button class="side-panel__close" id="panel-close" aria-label="Close">✕</button>
  </div>
  <div class="side-panel__body" id="panel-body"></div>
</aside>

<script src="/app.js"></script>
</body>
</html>
