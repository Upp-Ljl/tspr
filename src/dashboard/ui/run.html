<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tspr — Run #{{RUN_ID}}</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<header class="topbar">
  <a class="topbar__brand" href="/">tspr</a>
  <div class="topbar__right">
    <a class="btn btn--icon" href="/settings" title="Settings" aria-label="Settings">
      <svg width="15" height="15" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.6"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </a>
  </div>
</header>

<main class="page" id="run-page">
  <a class="back-link" href="/">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
      <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    All runs
  </a>

  <!-- Run header: status pill, runId, project, model, duration -->
  <div id="run-header" class="run-header-block"></div>

  <!-- Hydrated by JS from inline data -->
  <div id="run-root"
    data-run-id="{{RUN_ID}}"
    data-status="{{RUN_STATUS}}"
    data-run="{{RUN_JSON}}"
    data-results="{{TEST_RESULTS_JSON}}">
  </div>

  <!-- Scenario list — primary content -->
  <div id="scenario-section">
    <!-- populated by initRunDetail in app.js -->
  </div>

  <!-- Dev-only transparency panel — rendered only when ?dev=1 is in URL -->
  <div id="transparency-panel" style="margin-top:2rem"></div>
</main>

<!-- Apply-fix feedback toast -->
<div id="fix-toast" class="fix-toast" style="display:none"></div>

<!-- Side panel for scenario detail: stack, suggestedFixRegion, patch, Apply Fix -->
<div class="side-panel__overlay" id="panel-overlay"></div>
<aside class="side-panel" id="side-panel">
  <div class="side-panel__header">
    <div class="side-panel__title" id="panel-title">Scenario detail</div>
    <button class="side-panel__close" id="panel-close" aria-label="Close">✕</button>
  </div>
  <div class="side-panel__body" id="panel-body"></div>
</aside>

<script src="/app.js"></script>
</body>
</html>
