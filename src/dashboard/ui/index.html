<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tspr dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<header class="topbar">
  <a class="topbar__brand" href="/">tspr</a>
  <div class="topbar__filter">
    <select class="project-filter" id="project-filter" title="Filter by project">
      <option value="">All projects ▾</option>
    </select>
  </div>
  <div class="topbar__right">
    <span class="topbar__live-badge" id="topbar-live" style="display:none"></span>
    <a class="btn btn--icon" href="/settings" title="Settings" aria-label="Settings">
      <svg width="15" height="15" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.6"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </a>
  </div>
</header>

<main class="page">

  <!-- Two-column: Recent Runs (primary ~60%) + Projects with Changes (sidebar ~40%) -->
  <div class="home-layout">

    <!-- LEFT: Recent Runs — always visible, no collapse toggle -->
    <div class="home-layout__main">
      <div class="section-header">
        Recent Runs
        <span class="section-header__count" id="runs-count">0</span>
        <span class="section-header__page" id="runs-pager" style="margin-left:auto;font-size:0.68rem;color:var(--text-dim)"></span>
      </div>

      <div id="runs-list">
        <div class="spinner-center"><div class="spinner"></div></div>
      </div>

      <div class="runs-pagination" id="runs-pagination" style="display:none">
        <button class="btn" id="runs-prev" disabled>← Prev</button>
        <button class="btn" id="runs-next">Next →</button>
      </div>
    </div>

    <!-- RIGHT: Project cards with Changes column -->
    <div class="home-layout__sidebar">
      <div class="section-header">
        Projects
        <span class="section-header__count" id="projects-count">0</span>
      </div>

      <div id="project-list">
        <!-- populated by app.js initHome -->
      </div>
    </div>

  </div>

</main>

<!-- Side panel for run drill-down -->
<div class="side-panel__overlay" id="panel-overlay"></div>
<aside class="side-panel" id="side-panel">
  <div class="side-panel__header">
    <div class="side-panel__title" id="panel-title">Run detail</div>
    <button class="side-panel__close" id="panel-close" aria-label="Close">✕</button>
  </div>
  <div class="side-panel__body" id="panel-body">
    <div class="spinner"></div>
  </div>
</aside>

<!-- Toast -->
<div id="fix-toast" class="fix-toast" style="display:none"></div>

<script src="/app.js"></script>
</body>
</html>
